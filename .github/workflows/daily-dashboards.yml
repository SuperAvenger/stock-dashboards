name: Daily Stock Dashboards

on:
  schedule:
    # 周一至周五，每天 8:30 + 17:00 北京时间 (UTC 0:30 + 9:00)
    - cron: '30 0,9 * * 1-5'
  workflow_dispatch:

jobs:
  generate-dashboards:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests longport

      - name: Generate HK Dashboard (Pro Version)
        env:
          LONGPORT_APP_KEY: ${{ secrets.LONGPORT_APP_KEY }}
          LONGPORT_ACCESS_TOKEN: ${{ secrets.LONGPORT_ACCESS_TOKEN }}
        run: python scripts/hk_dashboard_pro.py

      - name: Generate US Dashboard (Pro Version)
        env:
          LONGPORT_APP_KEY: ${{ secrets.LONGPORT_APP_KEY }}
          LONGPORT_ACCESS_TOKEN: ${{ secrets.LONGPORT_ACCESS_TOKEN }}
        run: python scripts/us_dashboard_pro.py

      - name: Push to Feishu
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python scripts/push_to_feishu.py

      - name: Upload output to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    needs: generate-dashboards
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
